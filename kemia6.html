<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>A Teljes Periódusos Rendszer</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --alkali: #ff9999; --alkaline: #ffcc99; --transition: #ffff99;
            --lanthanide: #ffb3e6; --actinide: #cc99ff; --metalloid: #99ff99;
            --post-trans: #99ffff; --nonmetal: #b3ffb3; --noble: #c2c2f0;
            --halogen: #ffffcc;
        }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(18, 40px); 
            grid-template-rows: repeat(10, 48px); 
            gap: 2px; 
            padding: 20px; 
            background: #fff; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .el { 
            width: 40px; height: 48px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border: 1px solid #ddd; 
            cursor: pointer; font-size: 10px; transition: 0.2s;
        }
        .el:hover { transform: scale(1.5); z-index: 10; box-shadow: 0 0 10px rgba(0,0,0,0.3); border-color: #000; }
        .el b { font-size: 14px; }
        .el i { font-size: 7px; font-style: normal; }
        
        .panel { 
            margin-top: 20px; width: 600px; padding: 20px; 
            background: white; border-radius: 10px; border-top: 5px solid #333; 
        }
        
        /* Színkategóriák */
        .alkali { background: var(--alkali); } .alkaline { background: var(--alkaline); }
        .trans { background: var(--transition); } .lanth { background: var(--lanthanide); }
        .actin { background: var(--actinide); } .metalloid { background: var(--metalloid); }
        .post { background: var(--post-trans); } .nonmetal { background: var(--nonmetal); }
        .noble { background: var(--noble); } .halogen { background: var(--halogen); }
    </style>
</head>
<body>

    <h1>Interaktív Periódusos Rendszer</h1>
    
    <div class="grid" id="master-grid"></div>

</body>
</html>
